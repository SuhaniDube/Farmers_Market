{% extends "base.html" %}

{% block title %}Edit {{ product.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h2 class="text-center mb-4">Edit Product</h2>
                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="Vegetable" {% if product.category == 'Vegetable' %}selected{% endif %}>Vegetable</option>
                                <option value="Fruit" {% if product.category == 'Fruit' %}selected{% endif %}>Fruit</option>
                                <option value="Grain" {% if product.category == 'Grain' %}selected{% endif %}>Grain</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" required>{{ product.description }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="quantity" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="quantity" name="quantity" step="0.1" value="{{ product.quantity }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="unit" class="form-label">Unit</label>
                            <select class="form-select" id="unit" name="unit" required>
                                <option value="Kilogram (kg)" {% if product.unit == 'Kilogram (kg)' %}selected{% endif %}>Kilogram (kg)</option>
                                <option value="Gram (g)" {% if product.unit == 'Gram (g)' %}selected{% endif %}>Gram (g)</option>
                                <option value="Quintal (q)" {% if product.unit == 'Quintal (q)' %}selected{% endif %}>Quintal (q)</option>
                                <option value="Tonne (t)" {% if product.unit == 'Tonne (t)' %}selected{% endif %}>Tonne (t)</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="base_price" class="form-label">Base Price (₹)</label>
                            <input type="number" class="form-control" id="base_price" name="base_price" step="0.01" value="{{ product.base_price }}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="image" class="form-label">Product Image</label>
                        {% if product.image_path %}
                        <div class="mb-2">
                            <img src="{{ url_for('static', filename=product.image_path) }}" class="img-fluid rounded" alt="{{ product.name }}" style="max-height: 200px;">
                        </div>
                        {% endif %}
                        <input type="file" class="form-control" id="image" name="image" accept="image/*">
                        <div class="form-text">Leave empty to keep current image. Supported formats: JPG, PNG, GIF. Max size: 16MB</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Update Product</button>
                        <a href="{{ url_for('views.view_product', id=product.id) }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('image').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file && file.size > 16 * 1024 * 1024) {
        alert('File size must be less than 16MB');
        this.value = '';
    }
});
</script>
{% endblock %}
